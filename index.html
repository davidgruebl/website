<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>David Thomas Grübl</title>
    <meta name="description" content="fintech enthusiast">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap');

      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; }

      body {
        font-family: 'Inter', -apple-system, sans-serif;
        background: #0c0c0c;
        color: #d4d4d4;
      }

      .page {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 100vh;
      }

      .photo {
        overflow: hidden;
      }

      .photo img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        filter: grayscale(20%) contrast(1.05);
        transition: filter 1.2s ease;
      }

      .photo:hover img {
        filter: grayscale(0%) contrast(1);
      }

      .info {
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 4rem;
        gap: 1.5rem;
        opacity: 0;
        transform: translateY(24px);
        animation: arrive 0.8s ease forwards 0.4s;
      }

      h1 {
        font-weight: 200;
        font-size: 2.4rem;
        letter-spacing: 0.06em;
        line-height: 1.3;
        color: #e8e8e8;
      }

      .links {
        display: flex;
        flex-direction: column;
        gap: 0.6rem;
      }

      a {
        color: rgba(255, 255, 255, 0.35);
        text-decoration: none;
        font-size: 0.88rem;
        font-weight: 300;
        letter-spacing: 0.03em;
        width: fit-content;
        transition: color 0.3s;
      }

      a:hover { color: #fff; }

      @keyframes arrive {
        to { opacity: 1; transform: translateY(0); }
      }

      @media (max-width: 768px) {
        .page {
          grid-template-columns: 1fr;
          grid-template-rows: 55vh auto;
        }
        .info {
          padding: 2rem 2rem 3rem;
          justify-content: flex-start;
        }
        h1 { font-size: 1.7rem; }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <div class="photo">
        <img src="dtg.jpg" alt="David Thomas Grübl">
      </div>
      <div class="info">
        <h1>David Thomas<br>Grübl</h1>
        <div class="links">
          <a target="_blank" href="https://www.linkedin.com/in/davidgruebl/">LinkedIn</a>
          <a href="mailto:me@dtg.sexy">me@dtg.sexy</a>
        </div>
      </div>
    </div>

    <script defer src="/_vercel/insights/script.js"></script>
  </body>
</html>
